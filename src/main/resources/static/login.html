<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flame — Login</title>
    <style>
        :root{--bg:#020617;--card:#1a1f37;--muted:#8892a0;--accent:#f53838}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;min-height:100vh;background:var(--bg);color:#e0e6ed;display:grid;place-items:center}
        .container{width:100%;max-width:420px;padding:24px}
        .logo{text-align:center;margin-bottom:32px}
        .logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff8a80);display:grid;place-items:center;color:#fff;font-weight:700;font-size:1.4rem;margin:0 auto 12px}
        .logo h1{font-size:1.5rem;font-weight:700}
        .logo p{color:var(--muted);font-size:0.9rem;margin-top:4px}
        .card{background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:32px}
        .tabs{display:flex;gap:4px;margin-bottom:28px;background:rgba(255,255,255,0.03);border-radius:8px;padding:4px}
        .tab{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.9rem;background:transparent;color:var(--muted);transition:all .2s}
        .tab.active{background:var(--accent);color:#fff}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:0.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:6px}
        .form-group input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:inherit;border-radius:8px;padding:12px 14px;font-size:0.95rem;outline:none;transition:border .2s}
        .form-group input:focus{border-color:var(--accent)}
        .form-group input::placeholder{color:var(--muted)}
        .btn-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px;transition:background .2s}
        .btn-submit:hover{background:#ff5252}
        .btn-submit:disabled{background:#555;cursor:not-allowed}
        .alert{padding:12px 14px;border-radius:8px;font-size:0.9rem;margin-bottom:16px;display:none}
        .alert.error{background:rgba(245,56,56,0.15);border:1px solid rgba(245,56,56,0.3);color:#ff6b6b}
        .alert.success{background:rgba(56,245,100,0.15);border:1px solid rgba(56,245,100,0.3);color:#6bffaa}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">F</div>
            <h1>Flame</h1>
            <p>Rekomendasi Game Terbaik</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
                <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
            </div>

            <div id="alertBox" class="alert"></div>

            <!-- Form Login -->
            <div id="formLogin">
                <div class="form-group">
                    <label>Username</label>
                    <input id="loginUsername" type="text" placeholder="Masukkan username..." />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="loginPassword" type="password" placeholder="Masukkan password..." />
                </div>
                <button class="btn-submit" id="btnLogin" onclick="doLogin()">Masuk</button>
            </div>

            <!-- Form Register -->
            <div id="formRegister" style="display:none">
                <div class="form-group">
                    <label>Username</label>
                    <input id="regUsername" type="text" placeholder="Buat username..." />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input id="regEmail" type="email" placeholder="Masukkan email..." />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="regPassword" type="password" placeholder="Buat password..." />
                </div>
                <button class="btn-submit" id="btnRegister" onclick="doRegister()">Daftar</button>
            </div>

            <div style="margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05);text-align:center">
                <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;text-decoration:underline" onclick="clearData()">Clear Data & Refresh</button>
            </div>
        </div>
    </div>

    <script>
        const AUTH_KEY = 'flameAuthUser';

        // Validasi login yang ketat
        function isValidAuth() {
            try {
                const authRaw = localStorage.getItem(AUTH_KEY);
                if (!authRaw) return false;
                const auth = JSON.parse(authRaw);
                return auth && auth.username && auth.username.trim().length > 0;
            } catch (e) {
                return false;
            }
        }

        // Kalau sudah login dan valid, langsung redirect
        if (isValidAuth()) {
            window.location.href = '/';
        }

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
            document.getElementById('formRegister').style.display = isLogin ? 'none' : 'block';
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
            hideAlert();
        }

        function showAlert(message, type = 'error') {
            const box = document.getElementById('alertBox');
            box.textContent = message;
            box.className = `alert ${type}`;
            box.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        function clearData() {
            localStorage.removeItem(AUTH_KEY);
            sessionStorage.clear();
            showAlert('Data dihapus. Refresh halaman...', 'success');
            setTimeout(() => location.reload(), 1500);
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');

            if (!username || !password) { showAlert('Username dan password wajib diisi!'); return; }

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem(AUTH_KEY, JSON.stringify({ 
                        username: data.username, 
                        id: data.id 
                    }));
                    showAlert('Login berhasil! Mengalihkan...', 'success');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showAlert(data.message || 'Login gagal');
                }
            } catch (e) {
                showAlert('Gagal terhubung ke server');
            }

            btn.disabled = false;
            btn.textContent = 'Masuk';
        }

        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('btnRegister');

            if (!username || !email || !password) { showAlert('Semua kolom wajib diisi!'); return; }

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    showAlert('Registrasi berhasil! Silakan login.', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showAlert(data.message || 'Registrasi gagal');
                }
            } catch (e) {
                showAlert('Gagal terhubung ke server');
            }

            btn.disabled = false;
            btn.textContent = 'Daftar';
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const isLogin = document.getElementById('formLogin').style.display !== 'none';
                if (isLogin) doLogin(); else doRegister();
            }
        });
    </script>
</body>
</html>
